services:
  # SERVER (Backend)
  - type: web
    name: mentex-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash


